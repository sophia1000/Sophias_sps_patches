name: Build Repo Listing

on:
  workflow_dispatch:
  workflow_run:
    workflows: [Build Release]
    types:
      - completed
  release:
    types: [published, created, edited, unpublished, deleted, released]
  push:
    branches:
      - main
    paths:
      - package.json
      - source.json
      - .github/workflows/build-listing.yml
      - Website/index.html

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-listing:
    name: Build VPM Listing
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build VPM index.json
        shell: bash
        run: |
          mkdir -p Website
          node <<'NODE'
          const fs = require("fs");
          const https = require("https");

          function readJson(path) {
            return JSON.parse(fs.readFileSync(path, "utf8").replace(/^\uFEFF/, ""));
          }

          function fetchJson(url) {
            return new Promise((resolve) => {
              https.get(url, (res) => {
                if (res.statusCode < 200 || res.statusCode >= 300) {
                  res.resume();
                  resolve(null);
                  return;
                }

                let data = "";
                res.setEncoding("utf8");
                res.on("data", chunk => data += chunk);
                res.on("end", () => {
                  try {
                    resolve(JSON.parse(data.replace(/^\uFEFF/, "")));
                  } catch {
                    resolve(null);
                  }
                });
              }).on("error", () => resolve(null));
            });
          }

          (async () => {
            const source = readJson("source.json");
            const pkg = readJson("package.json");
            const existing = await fetchJson(source.url);
            const existingPackages = existing && existing.packages && typeof existing.packages === "object"
              ? existing.packages
              : {};

            const existingPackage = existingPackages[pkg.name] && typeof existingPackages[pkg.name] === "object"
              ? existingPackages[pkg.name]
              : {};
            const existingVersions = existingPackage.versions && typeof existingPackage.versions === "object"
              ? existingPackage.versions
              : {};

            const listing = {
              name: source.name,
              id: source.id,
              url: source.url,
              author: source.author,
              description: source.description,
              infoLink: source.infoLink,
              packages: {
                ...existingPackages,
                [pkg.name]: {
                  ...existingPackage,
                  versions: {
                    ...existingVersions,
                    [pkg.version]: pkg
                  }
                }
              }
            };

            fs.writeFileSync("Website/index.json", JSON.stringify(listing, null, 2) + "\n");
          })().catch(error => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Website

      - name: Deploy To GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
