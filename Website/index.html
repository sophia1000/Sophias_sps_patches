<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sophia's SPS Patcher</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Arial, Helvetica, sans-serif;
      background: #151515;
      color: #f2f2f2;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      box-sizing: border-box;
    }

    main {
      width: min(680px, 100%);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 32px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 18px;
      color: #cfcfcf;
      line-height: 1.5;
    }

    a.button {
      display: inline-block;
      margin: 8px 8px 8px 0;
      padding: 11px 16px;
      border-radius: 6px;
      background: #2f7dd1;
      color: white;
      text-decoration: none;
      font-weight: 700;
    }

    a.secondary {
      background: #3a3a3a;
    }

    code {
      display: block;
      margin-top: 12px;
      padding: 12px;
      overflow-wrap: anywhere;
      background: #222;
      border: 1px solid #3a3a3a;
      border-radius: 6px;
      color: #e8e8e8;
    }
  </style>
</head>
<body>
  <main>
    <h1>Sophia's SPS Patcher</h1>
    <p>Editor-only VRChat avatar SPS patching tools for VCC.</p>

    <a class="button" href="vcc://vpm/addRepo?url=https%3A%2F%2Fsophia1000.github.io%2FSophias_sps_patches%2Findex.json">Add to VCC</a>
    <a class="button secondary" href="index.json">View VPM Listing</a>
    <a class="button secondary" href="https://github.com/sophia1000/Sophias_sps_patches">View on GitHub</a>

    <p>Manual VCC repository URL:</p>
    <code>https://sophia1000.github.io/Sophias_sps_patches/index.json</code>
  </main>
</body>
</html>
